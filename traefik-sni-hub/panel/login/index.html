<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<meta name="robots" content="noindex, nofollow">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-base:    #0b0e17;
  --bg-surface: #111827;
  --bg-card:    #141d2e;
  --bg-input:   #0f1624;
  --accent:     #3b82f6;
  --accent-dim: #1d4ed8;
  --accent-glow: rgba(59, 130, 246, 0.15);
  --red:        #ef4444;
  --red-dim:    rgba(239, 68, 68, 0.12);
  --text-primary:   #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted:     #475569;
  --border:         #1e293b;
  --border-focus:   #3b82f6;
  --radius:    10px;
  --radius-sm: 6px;
}

body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 14px;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}

.card {
  width: 100%;
  max-width: 380px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 32px;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
}

/* brand */
.brand {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 6px;
}
.brand-icon {
  width: 38px;
  height: 38px;
  background: var(--accent-glow);
  border: 1px solid rgba(59, 130, 246, 0.3);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
}
.brand-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.2px;
}
.brand-sub {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}
.tagline {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 28px;
  padding-left: 49px;
}

/* alert */
.alert {
  padding: 10px 13px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  line-height: 1.5;
  margin-bottom: 18px;
  display: none;
}
.alert-err  { background: var(--red-dim); border: 1px solid rgba(239,68,68,.25); color: #fca5a5; }
.alert-warn { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.25); color: #fcd34d; }

/* form */
.fg { margin-bottom: 15px; }
.fg label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}
.fg input {
  width: 100%;
  padding: 9px 12px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 13.5px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.fg input:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.fg input::placeholder { color: var(--text-muted); }

.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
  font-size: 12.5px;
}
.row label {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--text-secondary);
  cursor: pointer;
  user-select: none;
}
.row input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; }

/* submit button */
.btn {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background .15s;
}
.btn:hover    { background: var(--accent-dim); }
.btn:disabled { opacity: .65; cursor: not-allowed; }

.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* footer */
.ft {
  text-align: center;
  margin-top: 24px;
  font-size: 11.5px;
  color: var(--text-muted);
}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Server Console</div>
      <div class="brand-sub">Administration</div>
    </div>
  </div>
  <p class="tagline">Authentication required</p>

  <div class="alert alert-err" id="err"></div>

  <form id="f">
    <div class="fg">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" required>
    </div>
    <div class="fg">
      <label for="pw">Password</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <div class="row">
      <label><input type="checkbox" name="remember"> Keep me signed in</label>
    </div>
    <button class="btn" type="submit" id="btn"><span id="bt">Sign in</span></button>
  </form>

  <div class="ft">&copy; 2026</div>
</div>

<script>
(function () {
  var f   = document.getElementById('f');
  var btn = document.getElementById('btn');
  var bt  = document.getElementById('bt');
  var err = document.getElementById('err');

  f.addEventListener('submit', function (e) {
    e.preventDefault();

    err.style.display = 'none';
    btn.disabled = true;
    bt.innerHTML = '<div class="spinner"></div>';

    fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('pw').value,
        remember: f.remember.checked
      })
    })
    .then(function (r) {
      return r.json().then(function (d) { return { status: r.status, data: d }; });
    })
    .then(function (r) {
      if (r.status === 200) {
        window.location.href = '/panel/';
        return;
      }
      document.getElementById('pw').value = '';
      err.textContent = (typeof r.data.detail === 'string' ? r.data.detail : null) || 'Authentication failed.';
      err.style.display = 'block';
    })
    .catch(function () {
      err.textContent = 'Service unavailable.';
      err.style.display = 'block';
    })
    .finally(function () {
      btn.disabled = false;
      bt.textContent = 'Sign in';
    });
  });
})();
</script>
</body>
</html>

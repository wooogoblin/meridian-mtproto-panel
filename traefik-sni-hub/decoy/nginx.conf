server {
    listen 8443 ssl;
    http2 on;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    # Auth API — 401 with JSON
    location /api/v1/auth/login {
        default_type application/json;
        add_header X-Request-ID $request_id always;
        add_header Cache-Control "no-store" always;
        return 401 '{"error":"invalid_credentials","message":"Invalid email or password. Please check your credentials and try again.","request_id":"$request_id"}';
    }

    # Catch-all API
    location /api/ {
        default_type application/json;
        return 404 '{"error":"not_found","message":"Endpoint not found"}';
    }

    # SPA routes — return index
    location /auth/  { try_files /index.html =404; }
    location /legal/ { try_files /index.html =404; }
    location /status { try_files /index.html =404; }

    location / { try_files $uri $uri/ =404; }
}
